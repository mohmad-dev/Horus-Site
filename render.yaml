services:
  - type: web
    name: horus-site
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm ci && npm run build:prod
    startCommand: npm run start:prod
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: NODE_ENV
        value: production

