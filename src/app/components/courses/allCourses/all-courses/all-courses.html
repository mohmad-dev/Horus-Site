
<section id="courses" dir="rtl"
    class="py-24 mt-28 bg-zinc-50 dark:bg-black transition-colors duration-500 overflow-hidden cursor-pointer">
    <div class="max-w-7xl mx-auto px-6">

        <a routerLink="/landing-page" class="inline-flex items-center gap-2 text-zinc-900 dark:text-white text-lg font-semibold hover:text-yellow-500 mb-12 transition-colors group">
            <i class="fa-solid fa-arrow-right transition-transform group-hover:translate-x-1"></i> 
            العودة إلى الصفحة الرئيسية
        </a>

        <div class="flex flex-col justify-center items-center gap-2 mb-12 text-center">
            <h2 class="text-yellow-600 dark:text-yellow-500 font-bold uppercase tracking-widest text-sm">
                دوراتنا التدريبية
            </h2>
            <h2 class="text-4xl md:text-5xl text-zinc-900 dark:text-white font-black tracking-tight">
                استكشف برامجنا التعليمية
            </h2>
            <div class="w-20 h-1.5 bg-yellow-500 rounded-full mt-4"></div>
        </div>

        <ng-container *ngIf="courses$ | async as courses; else loading">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 overflow-hidden">
                <div *ngFor="let course of courses; trackBy: trackById"
                    class="group relative bg-white dark:bg-zinc-900 border border-zinc-100 dark:border-zinc-800 shadow-lg hover:shadow-2xl rounded-[2.5rem] overflow-hidden transition-all duration-300 hover:-translate-y-2">
                    <div
                        class="absolute top-0 left-0 bg-yellow-500 text-black font-black flex items-center justify-center w-24 h-16 rounded-br-[2.5rem] text-xl z-20 transition-transform group-hover:scale-105">
                        {{ course.price }}$
                    </div>

                    <div
                        class="absolute top-5 right-5 bg-white/90 dark:bg-black/80 backdrop-blur-md text-zinc-900 dark:text-yellow-500 text-xs font-bold px-4 py-2 rounded-full z-20 shadow-sm border border-zinc-200/50 dark:border-zinc-700">
                        {{ course.category }}
                    </div>

                    <div class="relative w-full h-64 overflow-hidden">
                        <img [src]="course.imageUrl" [alt]="course.title"
                            class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                    </div>

                    <div class="p-8 text-right">
                        <h2 class="text-2xl text-yellow-600 dark:text-yellow-500 font-bold mb-6 transition-colors">
                            {{ course.title }}
                        </h2>

                        <a [routerLink]="['/course-details', course.slug]"
                            class="w-full py-4 bg-zinc-100 dark:bg-zinc-800 text-zinc-900 dark:text-white font-bold rounded-2xl flex items-center justify-center gap-2 hover:bg-yellow-500 hover:text-black transition-all duration-300">
                            عرض التفاصيل
                            <i class="fa-solid fa-arrow-left text-sm"></i>
                        </a>
                    </div>
                </div>
            </div>
        </ng-container>
        <ng-template #loading>
            <div class="text-center text-zinc-600 dark:text-zinc-300 font-semibold py-12">
                جاري تحميل الدورات...
            </div>
        </ng-template>

        
    </div>
</section>
